<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 520px;
      padding: 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus {
      border-color: #5c6bc0;
    }

    .btn-add {
      padding: 10px 20px;
      background: #5c6bc0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-add:hover {
      background: #4a59b0;
    }

    .btn-add:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #e0e0e0;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #5c6bc0;
      border-color: #5c6bc0;
      color: #fff;
    }

    .todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background: #fafafa;
      border-radius: 8px;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #ccc;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .todo-check.done {
      background: #4caf50;
      border-color: #4caf50;
    }

    .todo-check.done::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #333;
      transition: all 0.15s;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .btn-delete:hover {
      color: #e53935;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #aaa;
    }

    .btn-clear {
      background: none;
      border: none;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
    }

    .btn-clear:hover {
      color: #e53935;
    }

    .empty {
      text-align: center;
      padding: 32px 0;
      color: #bbb;
      font-size: 14px;
    }

    .loading {
      color: #aaa;
      font-size: 13px;
      text-align: center;
      padding: 24px;
    }

    .error-msg {
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      color: #c62828;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>📝 To-Do List</h1>

    <p class="subtitle">
      3-Tier App on Azure — Web VMSS → App VMSS → PostgreSQL
    </p>

    <div id="error-box" class="error-msg" style="display:none"></div>

    <form class="add-form" onsubmit="addTodo(event)">
      <input
        id="new-todo"
        type="text"
        placeholder="Add a new task..."
        maxlength="200"
        autocomplete="off"
      />

      <button class="btn-add" id="add-btn" type="submit">
        Add
      </button>
    </form>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">
        All
      </button>

      <button class="filter-btn" onclick="setFilter('active', this)">
        Active
      </button>

      <button class="filter-btn" onclick="setFilter('done', this)">
        Done
      </button>
    </div>

    <ul class="todo-list" id="todo-list">
      <li class="loading">Loading...</li>
    </ul>

    <div class="footer">
      <span id="count-label">0 items left</span>

      <button class="btn-clear" onclick="clearDone()">
        Clear completed
      </button>
    </div>
  </div>

  <script>
    const API = '/api/todos';

    let todos = [];
    let filter = 'all';

    async function req(method, url, body) {
      const res = await fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json'
        },
        body: body ? JSON.stringify(body) : undefined
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || `Error ${res.status}`);
      }

      return res.status === 204 ? null : res.json();
    }

    async function load() {
      try {
        todos = await req('GET', API);
        render();
        hideError();
      } catch (e) {
        showError(e.message);

        document.getElementById('todo-list').innerHTML =
          '<li class="empty">Could not load todos.</li>';
      }
    }

    async function addTodo(e) {
      e.preventDefault();

      const input = document.getElementById('new-todo');
      const title = input.value.trim();

      if (!title) return;

      const btn = document.getElementById('add-btn');
      btn.disabled = true;

      try {
        const todo = await req('POST', API, { title });

        todos.push(todo);

        input.value = '';

        render();
        hideError();
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    async function toggle(id) {
      const todo = todos.find(t => t.id === id);

      try {
        const updated = await req('PUT', `${API}/${id}`, {
          done: !todo.done
        });

        Object.assign(todo, updated);

        render();
      } catch (e) {
        showError(e.message);
      }
    }

    async function deleteTodo(id) {
      try {
        await req('DELETE', `${API}/${id}`);

        todos = todos.filter(t => t.id !== id);

        render();
      } catch (e) {
        showError(e.message);
      }
    }

    async function clearDone() {
      try {
        const done = todos.filter(t => t.done);

        await Promise.all(
          done.map(t => req('DELETE', `${API}/${t.id}`))
        );

        todos = todos.filter(t => !t.done);

        render();
      } catch (e) {
        showError(e.message);
      }
    }

    function setFilter(f, btn) {
      filter = f;

      document
        .querySelectorAll('.filter-btn')
        .forEach(b => b.classList.remove('active'));

      btn.classList.add('active');

      render();
    }

    function render() {
      const visible = todos.filter(t => {
        if (filter === 'all') return true;
        if (filter === 'done') return t.done;
        return !t.done;
      });

      const list = document.getElementById('todo-list');

      if (!visible.length) {
        let msg = '';

        if (filter === 'done') {
          msg = 'No completed tasks.';
        } else if (filter === 'active') {
          msg = 'All done! 🎉';
        } else {
          msg = 'No tasks yet. Add one above!';
        }

        list.innerHTML = `<li class="empty">${msg}</li>`;
      } else {
        list.innerHTML = visible
          .map(
            t => `
            <li class="todo-item">
              <div
                class="todo-check ${t.done ? 'done' : ''}"
                onclick="toggle(${t.id})">
              </div>

              <span class="todo-text ${t.done ? 'done' : ''}">
                ${esc(t.title)}
              </span>

              <button
                class="btn-delete"
                onclick="deleteTodo(${t.id})"
                title="Delete">
                ×
              </button>
            </li>
          `
          )
          .join('');
      }

      const active = todos.filter(t => !t.done).length;

      document.getElementById(
        'count-label'
      ).textContent = `${active} item${active !== 1 ? 's' : ''} left`;
    }

    function showError(msg) {
      const el = document.getElementById('error-box');

      el.textContent = '⚠ ' + msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-box').style.display = 'none';
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[c]));
    }

    load();
  </script>
</body>
</html>
