        source_address_prefix: "*"
        destination_address_prefix: "*"

  db_sub01:
    nsg_rules:
      - name: AllowDBport
        priority: 1000
        direction: Inbound
        access: Allow
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "5432"
        source_address_prefixes:
          - "10.0.0.48/28"
          - "10.0.0.64/28"
        destination_address_prefix: "*"
  db_sub02:
    nsg_rules:
      - name: AllowDBport
        priority: 1000
        direction: Inbound
        access: Allow
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "5432"
