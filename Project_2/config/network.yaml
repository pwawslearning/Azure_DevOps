          - "10.0.0.48/28"
          - "10.0.0.64/28"

  app_sub01:
    nsg_rules:
      - name: allow_ssh
        priority: 100
        direction: Inbound
        access: Allow
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "22"
        source_address_prefix: "VirtualNetwork"
        destination_address_prefix: "VirtualNetwork"
      - name: allow_Tcp
        priority: 1000
        direction: Inbound
        access: Allow
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "8000"
        source_address_prefixes:
          - "10.0.0.16/28"
          - "10.0.0.32/28"
        destination_address_prefix: "*"
      - name: DenyAllow
        priority: 4095
        direction: Inbound
        access: Deny
        protocol: "*"
        source_port_range: "*"
        destination_port_range: "*"
        source_address_prefix: "*"
        destination_address_prefix: "*"
  app_sub02:
